# Example: reverse proxy for Restaurant OS (same host: static SPA + Node API on port 3000).
# Copy the blocks you need into your server { } block.
#
# IMPORTANT: Keep the /api prefix when forwarding to Node, or login and JWT routes break.
# Wrong:  location /api/ { proxy_pass http://127.0.0.1:3000/; }   # strips /api → 401 on many routes
# Right: use one of the patterns below.
#
# 502 Bad Gateway = nginx cannot reach Node (process stopped, wrong port, firewall).
# On the server: curl -s http://127.0.0.1:3000/api/health  → should be {"ok":true,...}
# If curl works but browser gets 502, fix proxy_pass host/port in nginx.

server {
    listen 80;
    server_name yourdomain.com;

    root /var/www/restaurant-os/dashboard-client/dist;
    index index.html;

    # SPA (React)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — preserve full path including /api
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Alternative (also valid): no URI on proxy_pass → forwards full client URI
# location /api {
#     proxy_pass http://127.0.0.1:3000;
#     ...
# }
